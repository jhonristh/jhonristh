<svg width="900" height="540" viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9b0"/>
      <stop offset="60%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#ffb84d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .bg { fill: #05070a; }
    .ring { fill: none; stroke: #1c2730; stroke-width: 1; }
    .label { font-family: 'Courier New', monospace; font-size: 13px; fill: #9fb3ad; }
    .sublabel { font-family: 'Courier New', monospace; font-size: 10px; fill: #5a6b63; }
    .core { font-family: 'Courier New', monospace; font-size: 12px; fill: #ffe9b0; font-weight: bold; }
    .pulse { animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { r: 26; }
      50% { r: 30; }
    }
    @media (prefers-reduced-motion: reduce) {
      .pulse { animation: none; }
    }
  </style>
  <rect class="bg" width="900" height="540"/>

  <!-- five orbit rings, one per project -->
  <circle class="ring" cx="450" cy="260" r="60"/>
  <circle class="ring" cx="450" cy="260" r="105"/>
  <circle class="ring" cx="450" cy="260" r="150"/>
  <circle class="ring" cx="450" cy="260" r="195"/>
  <circle class="ring" cx="450" cy="260" r="235"/>

  <!-- sun / core -->
  <circle cx="450" cy="260" r="34" fill="url(#sunGlow)"/>
  <circle class="pulse" cx="450" cy="260" r="20" fill="#ffcf7a"/>
  <text x="450" y="264" text-anchor="middle" class="core">JAN CORE</text>

  <!-- orbit 1: I-ASCII (innermost, fastest) -->
  <circle r="5" fill="#ffe07a">
    <animateMotion dur="8s" repeatCount="indefinite" path="M 510,260 A 60,60 0 1 1 390,260 A 60,60 0 1 1 510,260"/>
  </circle>

  <!-- orbit 2: BUSINA -->
  <circle r="6" fill="#7fd1ff">
    <animateMotion dur="13s" repeatCount="indefinite" path="M 555,260 A 105,105 0 1 1 345,260 A 105,105 0 1 1 555,260"/>
  </circle>

  <!-- orbit 3: ECE Basics Companion -->
  <circle r="6" fill="#9fb3ad">
    <animateMotion dur="18s" repeatCount="indefinite" path="M 600,260 A 150,150 0 1 1 300,260 A 150,150 0 1 1 600,260"/>
  </circle>

  <!-- orbit 4: RelAI -->
  <circle r="7" fill="#c58bff">
    <animateMotion dur="24s" repeatCount="indefinite" path="M 645,260 A 195,195 0 1 1 255,260 A 195,195 0 1 1 645,260"/>
  </circle>

  <!-- orbit 5: TRIHALOCEN (outermost, slowest) -->
  <circle r="7" fill="#7fe6a0">
    <animateMotion dur="32s" repeatCount="indefinite" path="M 685,260 A 235,235 0 1 1 215,260 A 235,235 0 1 1 685,260"/>
  </circle>

  <text x="450" y="520" text-anchor="middle" class="sublabel">SOLAR SYSTEM NAVIGATION — SEE LEGEND BELOW</text>
</svg>
