<svg width="360" height="640" viewBox="0 0 360 640" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #05070a; }
    .hull { fill: none; stroke: #cdd7da; stroke-width: 1.4; font-family: 'Courier New', monospace; }
    .hulltext { font-family: 'Courier New', monospace; font-size: 13px; fill: #cdd7da; white-space: pre; }
    .window { fill: #7fd1ff; opacity: 0.85; }
    .fin { fill: #10151c; stroke: #7fe6a0; stroke-width: 1; }

    .flameOuter { fill: #ff9a3d; animation: flick 0.4s ease-in-out infinite alternate; }
    .flameInner { fill: #ffe07a; animation: flick 0.3s ease-in-out infinite alternate-reverse; }
    @keyframes flick {
      from { transform: scaleY(1) scaleX(1); opacity: 0.9; }
      to   { transform: scaleY(1.12) scaleX(0.94); opacity: 1; }
    }

    .particle { fill: #7fe6a0; animation: rise 1.8s linear infinite; }
    @keyframes rise {
      0%   { opacity: 0; transform: translateY(0); }
      15%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-90px); }
    }

    .bit { font-family: 'Courier New', monospace; font-size: 11px; fill: #274633; animation: fall 4s linear infinite; }
    @keyframes fall {
      0%   { opacity: 0; transform: translateY(-20px); }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(560px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .flameOuter, .flameInner { animation: none; opacity: 1; }
      .particle { animation: none; opacity: 0.6; }
      .bit { animation: none; opacity: 0.5; }
    }
  </style>

  <rect class="bg" width="360" height="640"/>

  <!-- binary rain, behind the rocket -->
  <text x="30"  y="0" class="bit" style="animation-delay:0s">01</text>
  <text x="70"  y="0" class="bit" style="animation-delay:0.6s">10</text>
  <text x="290" y="0" class="bit" style="animation-delay:1.1s">01</text>
  <text x="320" y="0" class="bit" style="animation-delay:1.7s">11</text>
  <text x="50"  y="0" class="bit" style="animation-delay:2.2s">00</text>
  <text x="310" y="0" class="bit" style="animation-delay:2.8s">10</text>
  <text x="20"  y="0" class="bit" style="animation-delay:3.3s">01</text>
  <text x="335" y="0" class="bit" style="animation-delay:0.3s">11</text>

  <!-- nose cone -->
  <path class="hull" d="M180,30 L155,120 L205,120 Z" fill="#10151c"/>

  <!-- body -->
  <rect class="hull" x="150" y="120" width="60" height="300" fill="#10151c"/>

  <!-- window rings -->
  <circle class="window" cx="180" cy="165" r="14"/>
  <circle class="hull" cx="180" cy="165" r="14" fill="none"/>
  <circle class="window" cx="180" cy="210" r="10" opacity="0.6"/>
  <circle class="window" cx="180" cy="250" r="10" opacity="0.5"/>

  <!-- hull panel lines -->
  <line class="hull" x1="150" y1="290" x2="210" y2="290"/>
  <line class="hull" x1="150" y1="340" x2="210" y2="340"/>
  <line class="hull" x1="150" y1="380" x2="210" y2="380"/>

  <!-- callsign -->
  <text x="180" y="320" text-anchor="middle" class="hulltext" font-size="10" fill="#5a6b63">JAN-01</text>

  <!-- fins -->
  <path class="fin" d="M150,360 L110,420 L150,420 Z"/>
  <path class="fin" d="M210,360 L250,420 L210,420 Z"/>

  <!-- base -->
  <rect class="hull" x="155" y="420" width="50" height="20" fill="#10151c"/>

  <!-- flame -->
  <path class="flameOuter" d="M158,440 L202,440 L192,510 L168,510 Z"/>
  <path class="flameInner" d="M167,440 L193,440 L186,485 L174,485 Z"/>

  <!-- rising energy particles -->
  <circle class="particle" cx="170" cy="500" r="2.4" style="animation-delay:0s"/>
  <circle class="particle" cx="180" cy="505" r="2" style="animation-delay:0.4s"/>
  <circle class="particle" cx="190" cy="500" r="2.4" style="animation-delay:0.8s"/>
  <circle class="particle" cx="175" cy="495" r="1.8" style="animation-delay:1.2s"/>
  <circle class="particle" cx="185" cy="498" r="2" style="animation-delay:1.5s"/>

  <text x="180" y="600" text-anchor="middle" class="hulltext" font-size="13" letter-spacing="4" fill="#7fe6a0">IGNITION</text>
  <text x="180" y="618" text-anchor="middle" class="hulltext" font-size="10" fill="#5a6b63" letter-spacing="2">ALL SYSTEMS NOMINAL</text>
</svg>
