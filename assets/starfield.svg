<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nebula1" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a3a4a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#05070a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="80%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#3a2a45" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#05070a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .bg { fill: #05070a; }
    .star { fill: #e8f0f2; animation: twinkle 3s ease-in-out infinite; }
    .star2 { fill: #7fd1ff; animation: twinkle 4s ease-in-out infinite; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 1; }
    }
    .shoot {
      stroke: #ffffff; stroke-width: 2; stroke-linecap: round; opacity: 0;
      animation: shoot 6s ease-in infinite;
      animation-delay: 2s;
    }
    @keyframes shoot {
      0% { opacity: 0; transform: translate(0,0); }
      2% { opacity: 1; }
      12% { opacity: 0; transform: translate(160px, 60px); }
      100% { opacity: 0; }
    }
  </style>
  <rect class="bg" width="900" height="160"/>
  <rect width="900" height="160" fill="url(#nebula1)"/>
  <rect width="900" height="160" fill="url(#nebula2)"/>

  <line class="shoot" x1="60" y1="20" x2="110" y2="45"/>

  <circle class="star" cx="30" cy="20" r="1.4" style="animation-delay:0s"/>
  <circle class="star" cx="80" cy="60" r="1" style="animation-delay:0.4s"/>
  <circle class="star2" cx="140" cy="30" r="1.6" style="animation-delay:0.8s"/>
  <circle class="star" cx="200" cy="90" r="1.2" style="animation-delay:1.2s"/>
  <circle class="star" cx="260" cy="45" r="1" style="animation-delay:1.6s"/>
  <circle class="star2" cx="320" cy="110" r="1.4" style="animation-delay:2s"/>
  <circle class="star" cx="380" cy="25" r="1" style="animation-delay:0.2s"/>
  <circle class="star" cx="430" cy="75" r="1.6" style="animation-delay:0.6s"/>
  <circle class="star2" cx="480" cy="130" r="1.2" style="animation-delay:1s"/>
  <circle class="star" cx="540" cy="40" r="1" style="animation-delay:1.4s"/>
  <circle class="star" cx="590" cy="95" r="1.4" style="animation-delay:1.8s"/>
  <circle class="star2" cx="640" cy="20" r="1" style="animation-delay:2.2s"/>
  <circle class="star" cx="690" cy="70" r="1.6" style="animation-delay:0.3s"/>
  <circle class="star" cx="740" cy="115" r="1" style="animation-delay:0.7s"/>
  <circle class="star2" cx="790" cy="35" r="1.2" style="animation-delay:1.1s"/>
  <circle class="star" cx="840" cy="85" r="1.4" style="animation-delay:1.5s"/>
  <circle class="star" cx="870" cy="130" r="1" style="animation-delay:1.9s"/>
  <circle class="star" cx="110" cy="130" r="1" style="animation-delay:2.4s"/>
  <circle class="star" cx="240" cy="140" r="1" style="animation-delay:2.6s"/>
  <circle class="star2" cx="360" cy="60" r="1" style="animation-delay:2.8s"/>
  <circle class="star" cx="510" cy="100" r="1" style="animation-delay:3s"/>
  <circle class="star" cx="620" cy="130" r="1" style="animation-delay:3.2s"/>
  <circle class="star2" cx="760" cy="45" r="1" style="animation-delay:3.4s"/>

  <text x="450" y="88" text-anchor="middle" font-family="Courier New, monospace" font-size="22" fill="#e8f0f2" letter-spacing="6">MISSION CONTROL</text>
  <text x="450" y="112" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#5a7a70" letter-spacing="3">EXPANDING HUMAN INTELLIGENCE THROUGH ENGINEERING</text>
</svg>
